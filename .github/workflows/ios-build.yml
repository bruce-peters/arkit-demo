name: Build iOS Unity Project

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and sign .ipa
        run: |
          xcodebuild -project ios_build/Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -archivePath ${{ runner.temp }}/MyApp.xcarchive \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="" \
            PRODUCT_BUNDLE_IDENTIFIER=${{ vars.BUNDLE_ID || 'com.brucepeters.arkitdemo' }} \
            archive
          mkdir -p ExportPlist
          cat > ExportPlist/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/MyApp.xcarchive \
            -exportPath ${{ runner.tool_cache }}/MyApp.ipa \
            -exportOptionsPlist ExportPlist/ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-iOS
          path: ${{ runner.tool_cache }}/MyApp.ipa

env:
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
