name: Build iOS Unity Project

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Fix IL2CPP .NET assemblies for macOS
        run: |
          RUNTIME_DIR="$DOTNET_ROOT/shared/Microsoft.NETCore.App"
          LATEST=$(ls -1 "$RUNTIME_DIR" | sort -V | tail -1)
          echo "Using .NET runtime: $LATEST at $RUNTIME_DIR/$LATEST"
          cp "$RUNTIME_DIR/$LATEST/System.Private.CoreLib.dll" \
            ios_build/Il2CppOutputProject/IL2CPP/build/deploy_arm64/System.Private.CoreLib.dll

      - name: Build unsigned .app
        run: |
          xcodebuild build \
            -project ios_build/Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -derivedDataPath ${{ runner.temp }}/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=${{ vars.BUNDLE_ID || 'com.brucepeters.arkitdemo' }}

      - name: Package .app into .ipa
        run: |
          APP_PATH="${{ runner.temp }}/DerivedData/Build/Products/Release-iphoneos/Unity-iPhone.app"
          PAYLOAD_PATH="${{ runner.temp }}/Payload"
          mkdir -p "$PAYLOAD_PATH"
          cp -R "$APP_PATH" "$PAYLOAD_PATH/"
          cd "${{ runner.temp }}"
          zip -r ${{ runner.tool_cache }}/MyApp.ipa Payload/

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-iOS
          path: ${{ runner.tool_cache }}/MyApp.ipa