name: Build iOS Unity Project

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}

      - name: Setup Unity
        uses: game-ci/unity-builder@v4
        with:
          unityVersion: 6000.5.0f1
          targetPlatform: iOS

      - name: Enable automatic signing in Xcode project
        run: |
          plist_path="build/iOS/Unity-iPhone/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.brucepeters.arkitdemo" "$plist_path" 2>/dev/null || true

      - name: Build and sign .ipa
        run: |
          cd build/iOS
          xcodebuild -project Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -archivePath ${{ runner.temp }}/MyApp.xcarchive \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="" \
            archive
          mkdir -p ExportPlist
          cat > ExportPlist/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/MyApp.xcarchive \
            -exportPath ${{ runner.tool_cache }}/MyApp.ipa \
            -exportOptionsPlist ExportPlist/ExportOptions.plist \
            -allowProvisioningUpdates

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-iOS
          path: ${{ runner.tool_cache }}/MyApp.ipa

env:
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
  UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
  APPLE_ID: ${{ secrets.APPLE_ID }}
  APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
