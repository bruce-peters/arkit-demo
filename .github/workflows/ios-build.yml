name: Build iOS Unity Project

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile IL2CPP output to libGameAssembly.a
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app
          SRC="ios_build/Il2CppOutputProject/Source/il2cppOutput"
          LIBSRC="ios_build/Il2CppOutputProject/IL2CPP/libil2cpp"
          OBJ_DIR="${{ runner.temp }}/il2cpp-objs"
          mkdir -p "$OBJ_DIR"

          INCS="-I$LIBSRC -I$LIBSRC/pch -Iios_build/Il2CppOutputProject/IL2CPP/external/bdwgc/include"
          CFLAGS="-arch arm64 -isysroot $SDK -miphoneos-version-min=15.0 -O2 -c -w"

          for src in $(find "$SRC" -name "*.cpp" -o -name "*.c"); do
            base=$(basename "$src" | sed 's/\.[^.]*$//')
            if [ "${src##*.}" = "c" ]; then
              clang $CFLAGS $INCS "$src" -o "$OBJ_DIR/${base}.o" 2>/dev/null
            else
              clang++ $CFLAGS -std=c++17 $INCS "$src" -o "$OBJ_DIR/${base}.o" 2>/dev/null
            fi
          done

          COUNT=$(ls "$OBJ_DIR"/*.o 2>/dev/null | wc -l | tr -d ' ')
          echo "Object files compiled: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            ar rcs "${{ runner.temp }}/libGameAssembly.a" "$OBJ_DIR"/*.o
            echo "Created libGameAssembly.a ($(du -h ${{ runner.temp }}/libGameAssembly.a | cut -f1))"
          else
            echo "ERROR: No object files compiled!"
            exit 1
          fi

      - name: Patch pbxproj - skip IL2CPP script
        run: |
          python3 << 'PYEOF'
          import re
          with open('ios_build/Unity-iPhone.xcodeproj/project.pbxproj', 'r') as f:
              c = f.read()
          c = re.sub(
              r'(C62A2A42F32E085EF849CF0B[\s\S]*?shellScript = )"((?:[^"\\]|\\.)*)"',
              r'\1"exit 0"',
              c
          )
          with open('ios_build/Unity-iPhone.xcodeproj/project.pbxproj', 'w') as f:
              f.write(c)
          PYEOF

      - name: Build unsigned .app
        run: |
          DEST="${{ runner.temp }}/DerivedData/Build/Products/Release-iphoneos"
          mkdir -p "$DEST"
          cp "${{ runner.temp }}/libGameAssembly.a" "$DEST/"
          xcodebuild build \
            -project ios_build/Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -configuration Release \
            -derivedDataPath ${{ runner.temp }}/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=${{ vars.BUNDLE_ID || 'com.brucepeters.arkitdemo' }}

      - name: Package .ipa
        run: |
          APP="${{ runner.temp }}/DerivedData/Build/Products/Release-iphoneos/Unity-iPhone.app"
          [ ! -d "$APP" ] && echo "No .app" && exit 1
          mkdir -p "${{ runner.temp }}/Payload" && cp -R "$APP" "${{ runner.temp }}/Payload/"
          cd "${{ runner.temp }}" && zip -r ${{ runner.tool_cache }}/MyApp.ipa Payload/

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-iOS
          path: ${{ runner.tool_cache }}/MyApp.ipa