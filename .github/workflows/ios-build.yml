name: Build iOS Unity Project

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Unity packages
        uses: actions/cache@v4
        with:
          key: Unity-6000.5.0f1
          path: /tmp/unity-packages

      - name: Download and install Unity
        run: |
          mkdir -p /tmp/unity-packages
          cd /tmp/unity-packages
          if [ ! -f Unity.pkg ]; then
            curl -o Unity.pkg "https://download.unity3d.com/download_unity/88b47c5e7076/MacEditorInstaller/Unity-6000.5.0f1.pkg"
          fi
          if [ ! -f Unity-iOS.pkg ]; then
            curl -o Unity-iOS.pkg "https://download.unity3d.com/download_unity/88b47c5e7076/MacEditorTargetInstaller/UnitySetup-iOS-Support-for-Editor-6000.5.0f1.pkg"
          fi
          sudo installer -pkg Unity.pkg -target /
          sudo installer -pkg Unity-iOS.pkg -target /

      - name: Find Unity path
        id: unity
        run: |
          p=$(find /Applications/Unity -name Unity -path "*/MacOS/Unity" | head -1)
          echo "path=$p" >> $GITHUB_OUTPUT

      - name: Activate Unity Personal
        run: |
          "${{ steps.unity.outputs.path }}" -batchmode -quit \
            -username "${{ secrets.UNITY_EMAIL }}" \
            -password "${{ secrets.UNITY_PASSWORD }}" \
            -logFile /tmp/unity-license.log || true
          cat /tmp/unity-license.log

      - name: Build iOS Xcode project
        run: |
          export IOS_BUILD_PATH="${{ runner.temp }}/Unity-iOS-Build"
          mkdir -p "$IOS_BUILD_PATH"
          "${{ steps.unity.outputs.path }}" -batchmode -quit \
            -projectPath "${{ github.workspace }}" \
            -logFile /tmp/unity-build.log \
            -executeMethod iOSBuilder.Build || true
          cat /tmp/unity-build.log
          ls -la "$IOS_BUILD_PATH/"

      - name: Build unsigned .app
        run: |
          PROJ=$(find "${{ runner.temp }}/Unity-iOS-Build" -name "*.xcodeproj" -maxdepth 2 | head -1)
          [ -z "$PROJ" ] && echo "No Xcode project found" && exit 1
          xcodebuild build \
            -project "$PROJ" \
            -scheme Unity-iPhone \
            -configuration Release \
            -derivedDataPath ${{ runner.temp }}/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=${{ vars.BUNDLE_ID || 'com.brucepeters.arkitdemo' }}

      - name: Package .ipa
        run: |
          APP="${{ runner.temp }}/DerivedData/Build/Products/Release-iphoneos/Unity-iPhone.app"
          [ ! -d "$APP" ] && echo "No .app found" && exit 1
          mkdir -p "${{ runner.temp }}/Payload"
          cp -R "$APP" "${{ runner.temp }}/Payload/"
          cd "${{ runner.temp }}"
          zip -r ${{ runner.tool_cache }}/MyApp.ipa Payload/

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-iOS
          path: ${{ runner.tool_cache }}/MyApp.ipa

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /tmp/unity-*.log

env:
  UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
  UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}